<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO do list </title>
</head>
<style>
    *{
    margin: 0;
    padding: 0;
    font-family: 'poppins',sans-serif;
    box-sizing: border-box;

}
    
.container{
width:100%;
min-height: 100vh;
background: linear-gradient(135deg,#1537,#4e4e4e);
padding: 15px;
}
.todo-app{
width: 100%;
max-width: 540px;
background: #fff;
margin: 100px auto 20px;
padding:40px 30px 70px;
border-radius: 10px;
}

.todo-app h2{
color: #002675;
display:flex;
align-items: center;
margin-bottom: 20px;
}
.row{
display: flex;
align-items: center;
justify-content: space-between;
background: #edeef0;
border-radius: 30px;
padding-left: 20px;
margin-bottom: 25px;

}
input{
flex: 1;
border: none;
outline: none;
background: transparent;
padding: 10px;
}
button{
border: none;
outline:none;
padding: 16px 50px;
background: #ff5945;
color: #ffff;
font-size: 16px;
cursor: pointer;
}
.todo{
  list-style:none;
  padding:0;
}

.todo li{
  display:flex;
  align-items:center;
  gap:.6rem;
  margin:.6rem 0;
}

.todo input[type="checkbox"]{
  appearance:none;
  width:20px; height:20px;
  border:2px solid #9AA4B2;
  border-radius:50%;
  display:inline-grid;
  place-content:center;
  cursor:pointer;
  transition:.15s ease;
  background:#fff;
}

.todo input[type="checkbox"]::after{
  content:"✓";
  transform:scale(0);
  font-size:14px;
  line-height:1;
}

.todo input[type="checkbox"]:checked{
  background:#ff6b4a;   
  border-color:#ff6b4a;
  color:#fff;
}

.todo input[type="checkbox"]:checked::after{
  transform:scale(1);
}

ul li.checked{
color: #555;
text-decoration: line-through;


}
 



ul li span{
background: #edeef0;
} */
    </style>
<body>
    <div class="container">
        <div class="todo-app">
            <h2>TO DO LIST APP</h2>
            <div class="row">
                <input type="text" id="input-box" placeholder="Add your text">
                <button onclick="addtask()">Add</button>
        </div>
        <ul id="list-container">



        </ul>
</div>
</div>
    
</body>
</html>
